<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>워크온 Work:ON — 국전 인재문화팀</title>
<!-- ═══════════════════════════════════════════════════════════
     ★ 팀 공유 설정 ★  (URL 입력 완료 상태 — 수정 불필요)
     ═══════════════════════════════════════════════════════════ -->
<script>
window.TEAM_API_URL = "https://script.google.com/macros/s/AKfycby-WndOIo_y0zQmkfby2IRJ2WqvjTj-qKztRJZpv2UwjMr87AGNyzJWx1UnQbDaBmn0pw/exec";
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
  /* ═══ Cal.com 디자인 토큰 ═══ */
  :root{
    /* surface — 연회색 페이지 위 흰 카드로 층 분리 */
    --page:#f3f4f6;
    --canvas:#ffffff; --surface-soft:#f1f3f5; --surface-card:#e9ecf0;
    --surface-strong:#d1d5db; --surface-dark:#101010; --surface-dark-el:#1a1a1a;
    /* text — 한 단계씩 진하게 */
    --ink:#0b0d12; --body-c:#1f2937; --muted:#4b5563; --muted-soft:#6b7280;
    --on-dark:#ffffff; --on-dark-soft:#a1a1aa;
    /* action */
    --primary:#111111; --primary-active:#2b2b2b; --accent:#2563eb;
    /* semantic */
    --success:#059669; --warning:#d97706; --error:#dc2626;
    /* hairline — 확실히 보이는 경계선 */
    --hairline:#d7dbe0; --hairline-soft:#e5e8ec;
    /* shadow — 카드 분리감 강화 */
    --shadow-sm:0 1px 3px rgba(15,23,42,.08); --shadow-md:0 6px 16px rgba(15,23,42,.12);
    /* ── 기존 스크립트 호환 별칭 ── */
    --text:#1f2937; --sub:#1f2937; --mut:#4b5563; --faint:#6b7280;
    --line:#d7dbe0; --line2:#e5e8ec; --bg:#f3f4f6; --card:#ffffff; --soft:#e9ecf0;
    --navy:#111111; --navy2:#2b2b2b;
    --red:#dc2626; --redbg:#fee2e2; --redline:#fca5a5;
    --gold:#92400e; --goldbg:#fef3c7; --goldline:#fcd34d;
    --green:#059669;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--page); color:var(--body-c);
    font-family:"Inter","Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",Roboto,sans-serif;
    font-size:14px; line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1040px; margin:0 auto; padding:40px 24px 96px}
  b,strong{font-weight:600}
  button{font-family:inherit; cursor:pointer; transition:background .12s,border-color .12s,color .12s}
  input,select,textarea{font-family:inherit; font-size:14px; color:var(--ink)}
  input:focus,select:focus,textarea:focus{outline:none; border-color:var(--ink)!important}
  input::placeholder,textarea::placeholder{color:var(--muted-soft)}
  button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--ink); outline-offset:2px; border-radius:8px}

  /* ═══ 헤더 — 디스플레이 타이포 (Cal Sans 대체: Inter 600 + 네거티브 자간) ═══ */
  .header{display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:24px}
  .eyebrow{font-size:13px; font-weight:500; letter-spacing:0; color:var(--muted); margin-bottom:8px}
  h1{font-size:32px; font-weight:600; margin:0; letter-spacing:-1px; line-height:1.15; color:var(--ink)}
  .save-badge{font-size:13px; font-weight:500; min-width:80px; text-align:right; color:var(--muted)}
  .save-badge.ok{color:var(--success)} .save-badge.err{color:var(--error)}

  /* ═══ 탭 — nav-pill-group (시그니처 필-인-필) ═══ */
  .tabs{display:flex; gap:12px; align-items:center; margin-bottom:32px; flex-wrap:wrap}
  .pill-group{display:inline-flex; background:#e2e6eb; border-radius:9999px; padding:5px; gap:2px; flex-wrap:wrap}
  .tab{
    padding:8px 16px; font-size:14px; font-weight:500; background:transparent;
    border:none; color:#374151; border-radius:9999px; white-space:nowrap;
  }
  .tab.active{background:var(--canvas); color:var(--ink); font-weight:600; box-shadow:var(--shadow-sm)}
  .tabs .spacer{flex:1}
  .owner-sel{
    padding:9px 12px; font-size:13px; font-weight:500; border:1px solid var(--hairline);
    border-radius:8px; background:var(--canvas); color:var(--body-c);
  }

  /* ═══ 주차 내비 ═══ */
  .weeknav{
    display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:16px;
    padding:20px 24px; background:var(--canvas); border:1px solid var(--hairline);
    border-radius:12px; box-shadow:var(--shadow-sm);
  }
  .nav-btn{
    padding:9px 16px; font-size:14px; font-weight:600; background:var(--canvas);
    border:1px solid var(--hairline); border-radius:8px; color:var(--ink); height:40px;
  }
  .nav-btn:active{background:var(--surface-soft)}
  .nav-btn.accent{border-color:var(--ink)}
  .week-title{font-size:20px; font-weight:600; letter-spacing:-0.5px; color:var(--ink); text-align:center}
  .now-chip{
    margin-left:8px; font-size:12px; font-weight:500; color:var(--ink); background:var(--surface-card);
    padding:3px 12px; border-radius:9999px; vertical-align:middle; letter-spacing:0;
  }
  .week-range{font-size:13px; color:#4b5563; margin-top:3px; text-align:center}
  .nav-right{display:flex; gap:8px; justify-content:flex-end}

  /* ═══ 진행률 ═══ */
  .progress-wrap{display:flex; align-items:center; gap:14px; margin:20px 2px 24px}
  .pbar{flex:1; height:6px; background:var(--surface-card); border-radius:9999px; overflow:hidden}
  .pfill{height:100%; background:var(--primary); border-radius:9999px; transition:width .3s}
  .plabel{font-size:13px; color:var(--muted); font-weight:500; white-space:nowrap}

  /* ═══ 배너 ═══ */
  .carry-banner{
    display:flex; justify-content:space-between; align-items:center; gap:16px;
    background:var(--surface-card); border:none; border-radius:12px;
    padding:20px 24px; margin-bottom:24px; font-size:14px; color:var(--body-c);
  }
  .carry-banner strong{color:var(--ink)}
  .carry-btn{
    padding:0 20px; height:40px; font-size:14px; font-weight:600; background:var(--primary);
    color:var(--on-dark); border:none; border-radius:8px; white-space:nowrap;
  }
  .carry-btn:active{background:var(--primary-active)}
  .empty{
    padding:48px 24px; text-align:center; color:var(--muted); font-size:14px;
    background:var(--canvas); border:1px dashed #c3cbd5; border-radius:12px; margin-bottom:24px; background:var(--canvas);
  }

  /* ═══ 파트·분류 구조 ═══ */
  .part-seg{display:inline-flex; background:#e2e6eb; border:none; border-radius:9999px; padding:5px; gap:2px}
  .part-seg .seg{padding:7px 16px; font-size:13px; font-weight:500; background:transparent; border:none; color:var(--muted); border-radius:9999px}
  .part-seg .seg.active{background:var(--canvas); color:var(--ink); font-weight:600; box-shadow:var(--shadow-sm)}
  .part-block{margin-bottom:48px}
  .part-header{display:flex; align-items:center; gap:10px; border-left:3px solid var(--ink); padding:2px 0 2px 14px; margin-bottom:16px}
  .part-name{font-size:18px; font-weight:600; letter-spacing:-0.3px}
  .cat-section{margin-bottom:24px}
  .cat-header{display:flex; align-items:center; gap:10px; margin-bottom:10px; padding-left:2px}
  .cat-num{
    width:22px; height:22px; border-radius:6px; background:var(--ink); color:var(--on-dark);
    font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center;
  }
  .cat-name{font-size:16px; font-weight:600; letter-spacing:-0.2px; color:var(--ink)}
  .cat-count{font-size:13px; color:var(--muted); font-weight:500}

  /* ═══ 업무 카드 ═══ */
  .item{
    background:var(--canvas); border:1px solid var(--hairline); border-radius:12px;
    margin-bottom:10px; padding:16px 18px; transition:border-color .15s, box-shadow .15s;
  }
  .item.dim{opacity:.55}
  .item.expanded{border-color:var(--ink); box-shadow:var(--shadow-md)}
  .item.overdue{border-color:#fecaca}
  .item-top{display:flex; gap:14px; align-items:flex-start}
  .status-badge{
    font-size:12px; font-weight:600; padding:6px 0; width:60px; text-align:center;
    border-radius:9999px; flex-shrink:0; border:1px solid transparent; letter-spacing:0;
  }
  .st-planned{background:#e2e6eb; color:#374151; border-color:#cfd5dc}
  .st-progress{background:#fef3c7; color:#92400e; border-color:#fcd34d}
  .st-done{background:var(--primary); color:var(--on-dark); border-color:var(--primary)}
  .st-carried{background:#fee2e2; color:#b91c1c; border-color:#fca5a5}
  .st-hold{background:#ede9fe; color:#6d28d9; border-color:#c4b5fd}
  .st-cancelled{background:#e5e7eb; color:#6b7280; border-color:#d1d5db}
  .item-main{flex:1; min-width:0; cursor:pointer}
  .item-text{font-size:15px; line-height:1.5; word-break:keep-all; color:var(--ink); font-weight:500}
  .item-text.strike{text-decoration:line-through; color:var(--muted); font-weight:400}
  .chip{
    margin-left:8px; font-size:12px; font-weight:500; padding:2px 10px;
    border-radius:9999px; white-space:nowrap; vertical-align:middle; display:inline-block; letter-spacing:0;
  }
  .chip.carry{background:#fee2e2; color:#b91c1c; font-weight:600}
  .chip.carry.hot{background:var(--error); color:#fff}
  .chip.prio-high{background:#fef3c7; color:#92400e; font-weight:600}
  .chip.prio-urgent{background:var(--error); color:#fff}
  .chip.cmt{background:transparent; color:var(--muted); font-weight:500; padding-left:0}
  .item-meta{font-size:12.5px; color:var(--muted); margin-top:4px; display:flex; gap:12px; flex-wrap:wrap}
  .item-meta .no{font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,monospace; font-size:11.5px}
  .item-meta .owner{color:var(--body-c); font-weight:500}
  .item-meta .due.over{color:var(--error); font-weight:600}
  .ghost{
    padding:6px 10px; font-size:13px; background:transparent; border:none;
    color:#4b5563; border-radius:8px; font-weight:500; white-space:nowrap;
  }
  .ghost:active{background:var(--surface-soft)}
  .ghost.danger{color:var(--error)}
  .result-input{
    width:calc(100% - 74px); margin:9px 0 0 74px; font-size:13px; padding:7px 10px;
    border:1px solid transparent; border-radius:8px; background:var(--surface-soft); color:var(--body-c);
  }
  .result-input:focus{background:#fff; border-color:var(--ink)!important}

  /* ═══ 상세 패널 ═══ */
  .detail{margin-top:14px; padding:20px; background:var(--surface-card); border:none; border-radius:12px}
  .grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px}
  .fld{font-size:12px; font-weight:500; color:var(--muted); display:flex; flex-direction:column; gap:5px; letter-spacing:0}
  .fld input,.fld select,.fld textarea{
    padding:9px 11px; border:1px solid var(--hairline); border-radius:8px;
    background:var(--canvas); font-weight:400; color:var(--ink); height:38px;
  }
  .fld textarea{height:auto; min-height:64px; resize:vertical; width:100%; line-height:1.5}
  .fld.block{margin-top:12px}
  .fld .need{border-color:#fecaca!important}
  .req{color:var(--error)}
  .cmt-row{display:flex; gap:10px; align-items:flex-start; padding:10px 12px; background:var(--canvas); border:1px solid var(--hairline-soft); border-radius:8px; margin-bottom:6px}
  .cmt-author{font-size:12px; font-weight:600; padding:2px 10px; border-radius:9999px; flex-shrink:0; margin-top:1px; background:var(--surface-card); color:var(--body-c)}
  .cmt-author.leader{background:var(--primary); color:var(--on-dark)}
  .cmt-text{font-size:13.5px; color:var(--body-c)}
  .cmt-date{font-size:11.5px; color:var(--muted-soft); margin-top:1px}
  .detail-foot{display:flex; justify-content:space-between; margin-top:14px; align-items:center}
  .hist{font-size:11.5px; color:var(--muted-soft)}

  /* ═══ 추가 폼 ═══ */
  .addrow{display:flex; gap:8px; margin-top:16px; flex-wrap:wrap}
  .addrow select,.addrow input{padding:0 12px; height:40px; font-size:14px; border:1px solid var(--hairline); border-radius:8px; background:var(--canvas)}
  #add-text{flex:1; min-width:220px}
  .add-btn{
    padding:0 20px; height:40px; font-size:14px; font-weight:600; background:var(--primary);
    color:var(--on-dark); border:none; border-radius:8px;
  }
  .add-btn:active{background:var(--primary-active)}

  /* ═══ 푸터 액션 ═══ */
  .footer{display:flex; align-items:center; gap:10px; margin-top:48px; padding-top:24px; border-top:1px solid var(--hairline-soft); flex-wrap:wrap}
  .report-btn{
    padding:0 24px; height:44px; font-size:14px; font-weight:600; background:var(--primary);
    color:var(--on-dark); border:none; border-radius:8px;
  }
  .report-btn:active{background:var(--primary-active)}
  .csv-btn{
    padding:0 18px; height:44px; font-size:14px; font-weight:600; background:var(--canvas);
    color:var(--ink); border:1px solid var(--hairline); border-radius:8px;
  }
  .csv-btn:active{background:var(--surface-soft)}
  .footer .spacer{flex:1}
  .reset-confirm{font-size:13px; color:var(--error)}

  /* ═══ 카드(대시보드·캘린더·담당자) ═══ */
  .card{
    background:var(--canvas); border:1px solid var(--hairline); border-radius:12px;
    padding:28px 28px 24px; margin-top:24px; box-shadow:var(--shadow-sm);
  }
  .card.warn{border-color:#fecaca; background:#fffafa}
  .card-title{font-size:18px; font-weight:600; letter-spacing:-0.3px; color:var(--ink); margin-bottom:16px}
  .card.warn .card-title{color:#b91c1c}
  table{width:100%; border-collapse:collapse; font-size:14px}
  th{text-align:left; padding:10px 12px; font-size:12px; font-weight:600; color:#374151; border-bottom:2px solid #cfd5dc; white-space:nowrap; letter-spacing:0}
  td{padding:13px 12px; border-bottom:1px solid var(--hairline-soft); white-space:nowrap; color:var(--body-c)}
  tbody tr{cursor:pointer}
  tbody tr:active td{background:var(--surface-soft)}
  .minibar{display:inline-block; width:72px; height:5px; background:var(--surface-card); border-radius:9999px; overflow:hidden; vertical-align:middle; margin-right:8px}
  .minibar i{display:block; height:100%; background:var(--primary); border-radius:9999px}
  .note{font-size:12.5px; color:#4b5563; margin-top:12px; line-height:1.5}
  .chronic-row{display:flex; gap:12px; align-items:flex-start; padding:12px 0; border-bottom:1px solid var(--hairline-soft)}
  .member-chip{font-size:13px; font-weight:500; color:var(--body-c); background:var(--surface-card); padding:7px 14px; border-radius:9999px; display:inline-block}
  .member-row{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
  .member-row select,.member-row input{padding:0 12px; height:38px; border:1px solid var(--hairline); border-radius:8px; background:var(--canvas)}
  .member-row input{width:120px}

  /* ═══ 검색 ═══ */
  .searchbar{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
  .searchbar input{flex:2; min-width:220px; padding:0 14px; height:40px; border:1px solid var(--hairline); border-radius:8px; background:var(--canvas)}
  .searchbar select{padding:0 10px; height:40px; border:1px solid var(--hairline); border-radius:8px; background:var(--canvas); font-weight:500; color:var(--body-c); font-size:13px}
  .search-count{font-size:13px; color:var(--muted); margin:14px 2px 16px}
  .search-row{background:var(--canvas); border:1px solid var(--hairline); border-radius:12px; padding:14px 18px; margin-bottom:8px; cursor:pointer; transition:border-color .12s}
  .search-row:active{border-color:var(--ink)}
  .sr-head{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
  .sr-badge{font-size:12px; font-weight:600; padding:3px 12px; border-radius:9999px; border:1px solid transparent}
  .sr-no{font-size:11.5px; color:var(--muted-soft); font-family:"JetBrains Mono",ui-monospace,monospace}
  .sr-week{font-size:12px; font-weight:600; color:var(--ink)}
  .sr-meta{font-size:12px; color:var(--muted)}
  .sr-text{font-size:15px; margin-top:6px; font-weight:500; color:var(--ink)}
  .sr-result{font-size:13px; color:var(--body-c); margin-top:3px}

  /* ═══ 모달 (hero 카드 규격: 16px 라운드) ═══ */
  .overlay{position:fixed; inset:0; background:rgba(17,17,17,.4); display:flex; align-items:center; justify-content:center; z-index:100; padding:16px}
  .modal{
    background:var(--canvas); border-radius:16px; width:min(720px,100%); max-height:84vh;
    display:flex; flex-direction:column; overflow:hidden; box-shadow:0 24px 48px rgba(0,0,0,.18);
  }
  .modal-head{display:flex; justify-content:space-between; align-items:center; padding:18px 24px; border-bottom:1px solid var(--hairline-soft); font-size:15px; gap:10px; flex-wrap:wrap; color:var(--ink)}
  .modal-head strong{font-weight:600; letter-spacing:-0.2px}
  .modal pre{margin:0; padding:24px; font-size:14.5px; line-height:1.7; overflow:auto; white-space:pre-wrap; word-break:keep-all; font-family:inherit; background:#f6f7f9; flex:1; color:#1f2937}
  .modal-foot{font-size:12px; color:var(--muted); padding:12px 24px 18px}
  .copy-btn{padding:0 18px; height:38px; font-size:13px; font-weight:600; background:var(--primary); color:var(--on-dark); border:none; border-radius:8px}
  .copy-btn:active{background:var(--primary-active)}
  .copy-btn.ok{background:var(--success)}

  /* ═══ 설정 화면 ═══ */
  .setup-card{max-width:560px; margin:48px auto; background:var(--canvas); border:1px solid var(--hairline); border-radius:16px; padding:40px; box-shadow:var(--shadow-md)}
  .setup-card h2{margin:0 0 10px; font-size:24px; font-weight:600; letter-spacing:-0.7px; color:var(--ink)}
  .setup-card p{font-size:14px; color:var(--body-c); line-height:1.6; margin:10px 0}
  .setup-card input{width:100%; padding:0 14px; height:44px; border:1px solid var(--hairline); border-radius:8px; margin-top:10px}
  .setup-card .btns{display:flex; gap:8px; margin-top:18px; flex-wrap:wrap}
  .setup-primary{padding:0 22px; height:44px; font-size:14px; font-weight:600; background:var(--primary); color:var(--on-dark); border:none; border-radius:8px}
  .setup-primary:active{background:var(--primary-active)}
  .setup-sub{padding:0 18px; height:44px; font-size:14px; font-weight:600; background:var(--canvas); color:var(--ink); border:1px solid var(--hairline); border-radius:8px}
  .setup-msg{font-size:13px; margin-top:12px}
  .setup-msg.err{color:var(--error)} .setup-msg.ok{color:var(--success)}
  .mode-chip{font-size:12px; font-weight:500; padding:3px 12px; border-radius:9999px; vertical-align:middle; margin-left:8px}
  .mode-chip.shared{background:#ecfdf5; color:#059669}
  .mode-chip.personal{background:var(--surface-card); color:var(--muted)}

  /* ═══ 계획 업로드 ═══ */
  .up-controls{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:16px}
  .up-controls .fld select{padding:0 12px; height:40px; border:1px solid var(--hairline); border-radius:8px; background:var(--canvas); min-width:150px}
  .up-grid{display:grid; grid-template-columns:1fr 1fr; gap:16px}
  .up-grid textarea{min-height:300px; padding:16px; border:1px solid var(--hairline); border-radius:12px; resize:vertical; font-family:inherit; font-size:14px; line-height:1.7}
  .up-preview{background:var(--surface-card); border:none; border-radius:12px; padding:16px; max-height:340px; overflow-y:auto}
  @media(max-width:700px){.up-grid{grid-template-columns:1fr}}

  /* ═══ 캘린더 ═══ */
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px}
  .cal-dow{text-align:center; font-size:12px; font-weight:600; color:#374151; padding:8px 0; letter-spacing:0}
  .cal-dow.sun{color:var(--error)} .cal-dow.sat{color:var(--accent)}
  .cal-cell{min-height:90px; background:var(--canvas); border:1px solid var(--hairline); border-radius:10px; padding:6px 7px; cursor:pointer; overflow:hidden; transition:border-color .12s, box-shadow .12s}
  .cal-cell:active{border-color:var(--ink)}
  .cal-cell.blank{background:transparent; border-color:transparent; cursor:default}
  .cal-cell.today{border-color:var(--ink)}
  .cal-cell.sel{background:var(--surface-soft); border-color:var(--ink); box-shadow:var(--shadow-sm)}
  .cal-date{font-size:12px; font-weight:600; color:var(--body-c); margin-bottom:4px}
  .cal-date.sun{color:var(--error)} .cal-date.sat{color:var(--accent)}
  .cal-cell.today .cal-date{color:var(--on-dark); background:var(--primary); display:inline-flex; width:21px; height:21px; border-radius:9999px; align-items:center; justify-content:center}
  .cal-pill{font-size:10.5px; font-weight:500; padding:2px 7px; border-radius:9999px; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .cal-pill.task{background:#e9ecf0; color:#1f2937; border-left:3px solid var(--ink); border-radius:4px 9999px 9999px 4px}
  .cal-pill.task.done{text-decoration:line-through; opacity:.5}
  .cal-more{font-size:10px; color:var(--muted); font-weight:600}
  .cal-list-row{display:flex; gap:12px; align-items:flex-start; padding:12px 4px; border-bottom:1px solid var(--hairline-soft)}
  .cal-add{display:flex; gap:8px; margin-top:18px; flex-wrap:wrap; align-items:center}
  .cal-add select,.cal-add input{padding:0 12px; height:40px; border:1px solid var(--hairline); border-radius:8px; background:var(--canvas)}
  .cal-add input{flex:1; min-width:200px}

  /* ═══ 차트 ═══ */
  .chart-duo{display:grid; grid-template-columns:1fr 1fr; gap:24px}
  @media(max-width:760px){.chart-duo{grid-template-columns:1fr}}
  .trend-chart{display:flex; gap:10px; align-items:stretch; height:180px; padding-top:8px}
  .trend-col{flex:1; display:flex; flex-direction:column; align-items:center; min-width:0}
  .trend-val{font-size:12px; font-weight:600; color:var(--body-c); height:18px}
  .trend-bar-wrap{flex:1; width:100%; max-width:36px; display:flex; align-items:flex-end; background:var(--surface-card); border-radius:8px; overflow:hidden}
  .trend-bar{width:100%; background:#9aa3af; border-radius:8px 8px 0 0; transition:height .3s}
  .trend-bar.cur{background:var(--primary)}
  .trend-label{font-size:11px; color:var(--muted); margin-top:6px; white-space:nowrap; letter-spacing:0}
  .trend-label.cur{color:var(--ink); font-weight:600}
  .trend-sub{font-size:10.5px; color:var(--muted-soft)}
  .stack-row{display:flex; align-items:center; gap:14px; margin-bottom:14px}
  .stack-label{width:84px; font-size:14px; font-weight:600; flex-shrink:0; letter-spacing:-0.2px}
  .stack-bar{flex:1; height:24px; border-radius:8px; overflow:hidden; display:flex; background:var(--surface-card)}
  .stack-seg{height:100%}
  .legend{display:flex; gap:14px; flex-wrap:wrap; margin-top:8px}
  .legend-item{font-size:12px; color:var(--muted); display:inline-flex; align-items:center; gap:5px}
  .legend-item i{width:10px; height:10px; border-radius:3px; display:inline-block}
  .hbar-row{display:flex; align-items:center; gap:12px; margin-bottom:10px}
  .hbar-label{width:116px; font-size:13px; font-weight:500; color:var(--body-c); text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex-shrink:0}
  .hbar-track{flex:1; height:20px; background:var(--surface-card); border-radius:6px; overflow:hidden}
  .hbar-fill{height:100%; background:#c3cbd5; border-radius:6px; position:relative}
  .hbar-done{height:100%; background:var(--primary); border-radius:6px 0 0 6px}
  .hbar-val{width:46px; font-size:13px; font-weight:600; color:var(--body-c); flex-shrink:0}

  /* ═══ 담당자(조직) ═══ */
  .org-wrap{margin-bottom:4px}
  .org-row{display:flex; gap:16px; flex-wrap:wrap}
  .org-line{width:1px; height:24px; background:var(--hairline); margin:8px auto}
  .org-parts{display:grid; grid-template-columns:1fr 1fr; gap:24px}
  @media(max-width:760px){.org-parts{grid-template-columns:1fr}}
  .org-part-col{background:var(--surface-card); border:none; border-radius:16px; padding:20px}
  .person-card{background:var(--canvas); border:1px solid var(--hairline); border-radius:12px; padding:16px 18px; margin-bottom:10px; min-width:260px; box-shadow:var(--shadow-sm)}
  .person-card.leader{border-color:var(--ink); background:var(--canvas)}
  .person-top{display:flex; gap:12px; align-items:center}
  .person-avatar{width:40px; height:40px; border-radius:9999px; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:600; flex-shrink:0}
  .person-name{font-size:15px; font-weight:600; letter-spacing:-0.2px; color:var(--ink)}
  .person-role{margin-top:4px; display:flex; gap:5px; align-items:center}
  .role-chip{font-size:11px; font-weight:500; padding:2px 10px; border-radius:9999px; background:var(--surface-card); color:var(--body-c); letter-spacing:0}
  .role-chip.lead{background:var(--primary); color:var(--on-dark)}
  .person-stats{display:flex; gap:4px; margin-top:14px; cursor:pointer; border-top:1px solid var(--hairline-soft); padding-top:12px}
  .person-stats>div{flex:1; text-align:center}
  .person-stats b{display:block; font-size:18px; font-weight:600; letter-spacing:-0.3px; color:var(--ink)}
  .person-stats span{font-size:11px; color:var(--muted)}
  .person-edit{display:flex; gap:8px; flex-wrap:wrap; margin-top:13px; padding-top:12px; border-top:1px dashed var(--hairline)}
  .person-edit .fld input,.person-edit .fld select{padding:0 10px; height:36px; border:1px solid var(--hairline); border-radius:8px; background:var(--canvas); width:100px}

  /* ═══ 반응형 ═══ */
  /* ═══ 모바일 최적화 ═══ */
  @media(max-width:768px){
    .wrap{padding:20px 14px 64px}
    h1{font-size:24px; letter-spacing:-0.7px}
    .header{flex-direction:column; align-items:flex-start; gap:6px; margin-bottom:16px}
    .save-badge{text-align:left; min-width:0}

    /* 탭: 한 줄 가로 스크롤 */
    .tabs{gap:8px; margin-bottom:20px}
    .pill-group{flex-wrap:nowrap; overflow-x:auto; max-width:100%; scrollbar-width:none; -webkit-overflow-scrolling:touch}
    .pill-group::-webkit-scrollbar{display:none}
    .tab{padding:8px 13px; font-size:13px; flex-shrink:0}
    .tabs .spacer{display:none}
    .owner-sel{flex:1; min-width:0}

    /* 주차·달 내비: 버튼 한 줄 + 제목 아래 (세로 글자 깨짐 방지) */
    .weeknav{display:flex; flex-wrap:wrap; align-items:center; padding:14px; gap:8px}
    .weeknav>div:first-child{order:1}
    .nav-right{order:2; margin-left:auto}
    .weeknav>div:nth-child(2){order:3; width:100%; text-align:center; margin-top:4px}
    .nav-btn{padding:7px 12px; font-size:13px; height:36px; white-space:nowrap}
    .week-title{font-size:17px}
    .week-range{font-size:12px}

    /* 업무 카드: 버튼을 둘째 줄로 내려 제목 폭 확보 */
    .item{padding:13px 14px}
    .item-top{flex-wrap:wrap; gap:8px 10px}
    .status-badge{width:52px; font-size:11.5px; padding:5px 0}
    .item-main{flex:1 1 calc(100% - 70px); min-width:0}
    .item-text{font-size:14.5px}
    .item-top>.ghost{flex:0 0 auto; padding:5px 10px; background:var(--surface-soft); border-radius:9999px; font-size:12.5px}
    .item-meta{gap:8px; font-size:12px}
    .result-input{width:100%; margin-left:0; margin-top:8px}
    .detail{padding:14px}
    .grid{grid-template-columns:1fr 1fr; gap:10px}

    /* 추가 폼 */
    .addrow{gap:6px}
    .addrow #add-part{flex:0 0 74px; width:auto}
    .addrow #add-owner{flex:1; width:auto; min-width:0}
    .addrow #add-cat{flex:1; width:auto; min-width:0}
    .addrow #add-text{flex:1 1 100%; min-width:0}
    .addrow .add-btn{flex:1 1 100%}

    /* 푸터 버튼 전체폭 */
    .footer{margin-top:32px; gap:8px}
    .report-btn,.csv-btn{flex:1; min-width:0; padding:0 10px}

    /* 카드·표·차트 */
    .card{padding:18px 16px; margin-top:16px}
    .card-title{font-size:16px}
    .trend-chart{height:150px; gap:6px; overflow-x:auto; padding-bottom:4px}
    .trend-col{min-width:42px}
    .trend-label{font-size:10px}
    .trend-val{font-size:11px}
    .stack-label{width:56px; font-size:13px}
    .hbar-label{width:88px; font-size:12px}
    .hbar-val{width:40px; font-size:12px}
    td{padding:11px 8px; font-size:13px}
    th{padding:8px 8px}

    /* 캘린더: 셀 축소 + 일정을 색 막대로 표시 */
    .cal-grid{gap:3px}
    .cal-cell{min-height:58px; padding:4px 5px; border-radius:8px}
    .cal-date{font-size:11px; margin-bottom:3px}
    .cal-cell.today .cal-date{width:18px; height:18px}
    .cal-pill{height:6px; padding:0; font-size:0; border-radius:3px; margin-bottom:3px}
    .cal-pill.task{border-left:none}
    .cal-more{font-size:9px}
    .cal-list-row{padding:10px 2px}
    .cal-add select{flex:1; min-width:0}
    .cal-add input{flex:1 1 100%; min-width:0}
    .cal-add .add-btn{flex:1 1 100%}

    /* 담당자·업로드 */
    .person-card{min-width:0; width:100%}
    .org-row{flex-direction:column}
    .org-row .person-card{width:100%}
    .up-grid textarea{min-height:200px}
    .member-row input{flex:1; min-width:0; width:auto}

    /* 설정·모달 */
    .setup-card{padding:24px 20px; margin:24px auto}
    .modal{max-height:90vh; border-radius:14px}
    .modal-head{padding:14px 16px}
    .modal pre{padding:16px; font-size:13.5px}
    .searchbar select{flex:1; min-width:0}
  }
  @media(max-width:400px){
    .cal-cell{min-height:50px}
    .tab{padding:7px 11px; font-size:12.5px}
    .status-badge{width:48px}
  }

  /* ═══ 브랜드·타이포 고급화 ═══ */
  .brand-logo{height:38px; display:block; margin-bottom:16px; user-select:none; -webkit-user-drag:none}
  body{letter-spacing:-0.01em}
  h1{font-weight:600}
  .card-title{letter-spacing:-0.4px}
  td,.person-stats b,.trend-val,.plabel,.hbar-val,.sr-no,.item-meta .no{font-variant-numeric:tabular-nums}
  .item-text{letter-spacing:-0.15px}
  .week-title{letter-spacing:-0.4px}
  /* 데스크톱 호버 피드백 */
  @media(hover:hover){
    .tab:hover:not(.active){color:var(--ink)}
    .nav-btn:hover{background:var(--surface-soft)}
    tbody tr:hover td{background:var(--surface-soft)}
    .dd-item:hover{border-color:var(--ink); box-shadow:var(--shadow-sm)}
    .search-row:hover{border-color:var(--ink)}
    .ghost:hover{background:var(--surface-soft)}
    .item:hover:not(.expanded){border-color:#c5cbd4}
    .cal-cell:hover{box-shadow:var(--shadow-sm)}
    .p-stat:hover{background:var(--surface-soft)}
    .dd-num:hover{background:var(--surface-card); font-weight:600}
  }
  /* 숫자 셀·스탯 클릭 상태 */
  .dd-num{cursor:pointer; border-radius:6px}
  .dd-num.on{background:var(--primary)!important; color:var(--on-dark)!important; font-weight:600}
  .p-stat{flex:1; text-align:center; cursor:pointer; border-radius:8px; padding:6px 2px; transition:background .12s}
  .p-stat.on{background:var(--primary)}
  .p-stat.on b,.p-stat.on span{color:var(--on-dark)!important}
  .p-stat b{display:block; font-size:18px; font-weight:600; letter-spacing:-0.3px; color:var(--ink)}
  .p-stat span{font-size:11px; color:var(--muted)}
  .dd-filter-head{font-size:13px; font-weight:600; color:var(--ink); margin-bottom:8px; display:flex; align-items:center}


  /* ═══ 사용법 탭 ═══ */
  .guide-flow{display:flex; flex-direction:column; gap:14px}
  .guide-flow-step{display:flex; gap:12px; align-items:flex-start}
  .guide-flow-step .cat-num{flex-shrink:0; margin-top:1px}
  .guide-flow-step b{font-size:14.5px; color:var(--ink)}
  .g-sub{font-size:13.5px; color:var(--body-c); line-height:1.65; margin-top:3px}
  .guide-two{display:grid; grid-template-columns:1fr 1fr; gap:14px}
  @media(max-width:700px){.guide-two{grid-template-columns:1fr}}
  .guide-box{background:var(--surface-card); border-radius:12px; padding:16px}
  .g-head{font-size:14px; font-weight:600; color:var(--ink); margin-bottom:6px}
  .g-example{background:var(--canvas); border:1px solid var(--hairline); border-radius:8px; padding:10px 12px; font-size:13px; color:var(--body-c); margin-top:8px; line-height:1.7}
  .g-kbd{display:inline-block; background:var(--primary); color:var(--on-dark); font-size:12px; font-weight:600; padding:2px 10px; border-radius:6px; white-space:nowrap}
  .guide-cycle{display:flex; align-items:center; gap:10px; flex-wrap:wrap; padding:6px 0}
  .g-arrow{color:var(--muted); font-weight:600}
  .guide-rule{font-size:13.5px; color:var(--body-c); line-height:1.65; padding:9px 0; border-bottom:1px solid var(--hairline-soft)}
  .guide-rule:last-of-type{border-bottom:none}

  /* ═══ 팀 현황 인라인 상세 ═══ */
  .dd-chev{display:inline-block; width:14px; color:var(--muted); font-size:11px}
  .dd-row td{border-bottom:1px solid var(--hairline)}
  .dash-detail{background:var(--surface-soft); border-top:1px solid var(--hairline-soft); padding:14px 16px 12px}
  .dd-sec{margin-bottom:12px}
  .dd-sec:last-child{margin-bottom:2px}

  .dd-title{font-size:12.5px; font-weight:600; color:var(--muted); margin-bottom:7px; letter-spacing:0}
  .dd-item{display:flex; gap:10px; align-items:flex-start; background:var(--canvas); border:1px solid var(--hairline-soft); border-radius:8px; padding:9px 11px; margin-bottom:5px; cursor:pointer; transition:border-color .12s}
  .dd-item:active{border-color:var(--ink)}
  .dd-body{flex:1; min-width:0}
  .dd-text{font-size:13.5px; font-weight:500; color:var(--ink); line-height:1.45; word-break:keep-all}
  .dd-meta{font-size:12px; color:var(--muted); margin-top:2px; line-height:1.5}
  .dd-open{font-size:11.5px; color:var(--muted-soft); flex-shrink:0; margin-top:2px; white-space:nowrap}
  .dd-empty{font-size:13.5px; color:var(--body-c); padding:6px 2px}
  .dd-clear{font-size:13px; color:#047857; background:#ecfdf5; border-radius:8px; padding:9px 12px; margin-bottom:12px; font-weight:500}
  @media(max-width:768px){
    .dash-detail{padding:12px 10px 10px}
    .dd-open{display:none}
  }






  /* ═══ 알림 ═══ */
  .noti-dot{position:absolute; top:-5px; right:-5px; background:var(--error); color:#fff; font-size:10px; font-weight:600; min-width:16px; height:16px; border-radius:9999px; display:flex; align-items:center; justify-content:center; padding:0 4px; line-height:1}
  .noti-row{display:flex; gap:10px; align-items:flex-start; padding:11px 10px; border-bottom:1px solid var(--hairline-soft); border-radius:8px}

  .noti-row.unread{background:#eff6ff}
  .noti-text{font-size:13.5px; color:var(--ink); line-height:1.5; word-break:keep-all}
  .noti-time{font-size:11.5px; color:var(--muted-soft); margin-top:2px}
  @media(hover:hover){.noti-row[data-action]:hover{background:var(--surface-soft)}}

  /* ═══ 쪽지·칭찬·사용자 선택 ═══ */
  .kd-form{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
  .kd-form select{padding:0 12px; height:40px; border:1px solid var(--hairline); border-radius:8px; background:var(--canvas)}
  .kd-form input{flex:1; min-width:200px; padding:0 12px; height:40px; border:1px solid var(--hairline); border-radius:8px}
  .kd-row{display:flex; gap:12px; align-items:flex-start; padding:12px 4px; border-bottom:1px solid var(--hairline-soft)}
  .kd-badge-big{font-size:24px; line-height:1; margin-top:2px}
  .kd-head{font-size:13.5px; color:var(--ink); display:flex; gap:6px; align-items:center; flex-wrap:wrap}
  .kd-arrow{color:var(--muted-soft)}
  .kd-text{font-size:14px; color:var(--body-c); margin-top:4px; line-height:1.55; word-break:keep-all}
  .dm-row{display:flex; gap:8px; margin-bottom:8px}
  .dm-row.mine{flex-direction:row-reverse}
  .dm-bubble{max-width:78%; background:var(--surface-card); border-radius:12px 12px 12px 4px; padding:9px 13px}

  .dm-text{font-size:14px; color:var(--body-c); line-height:1.5; word-break:break-word}
  .picker-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:14px 20px 22px}
  @media(max-width:480px){.picker-grid{grid-template-columns:1fr}}

  .picker-card:active{border-color:var(--ink)}
  @media(hover:hover){.picker-card:hover{border-color:var(--ink); box-shadow:var(--shadow-sm)}}
  .picker-name{font-size:14.5px; font-weight:600; color:var(--ink); display:block}
  .picker-role{font-size:12px; color:var(--muted); display:block; margin-top:2px}
  .picker-card>span:nth-child(2){flex:1}

</style>

<body>
<div class="wrap">

"use strict";
/* ══════════ 주간 업무 트래커 v3 ══════════
   인재문화팀: 팀장 임무택 상무 / 인사파트(정효남·김동면·김신혜) / 전산파트(안성민·전형만)
   신규: 담당자(조직) 탭 · 공유 캘린더 · 팀 현황 시각화 차트          */

const KEY="weekly-work-tracker-shared-v3";
const API_KEY="wwt-api-url";

/* ── 날짜 유틸 ── */
function mondayOf(d){const dt=new Date(d);const day=dt.getDay();dt.setDate(dt.getDate()+(day===0?-6:1-day));dt.setHours(0,0,0,0);return dt;}
function fmtKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function addDays(d,n){const dt=new Date(d);dt.setDate(dt.getDate()+n);return dt;}
function todayKey(){return fmtKey(new Date());}
function shiftWeek(key,n){return fmtKey(addDays(new Date(key+"T00:00:00"),7*n));}
function weekLabel(key){
  let mon=new Date(key+"T00:00:00");
  if(isNaN(mon.getTime()))mon=mondayOf(new Date());
  const fri=addDays(mon,4);
  const nth=Math.ceil(mon.getDate()/7);
  return {
    range:(mon.getMonth()+1)+"."+mon.getDate()+"(월) ~ "+(fri.getMonth()+1)+"."+fri.getDate()+"(금)",
    title:mon.getFullYear()+"년 "+(mon.getMonth()+1)+"월 "+nth+"주차",
    short:(mon.getMonth()+1)+"월 "+nth+"주차"
  };
}
const MONTH_ABBR={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
/* 어떤 형태의 날짜 값이든 yyyy-mm-dd 로 정규화 (빈값/파싱불가 → "") */
function normDateOnly(v){
  const s=String(v||"").trim();
  if(!s)return "";
  let m=s.match(/\d{4}-\d{2}-\d{2}/);
  if(m)return m[0];
  m=s.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d{1,2})\s+(\d{4})/);
  if(m)return fmtKey(new Date(+m[3],MONTH_ABBR[m[1]],+m[2]));
  const d=new Date(s);
  return isNaN(d.getTime())?"":fmtKey(d);
}
function normWeekKey(w){
  const dk=normDateOnly(w);
  if(dk)return fmtKey(mondayOf(new Date(dk+"T00:00:00")));
  return fmtKey(mondayOf(new Date()));
}
const DOW=["일","월","화","수","목","금","토"];

/* ── 표준값 ── */
const STATUS={
  planned:{label:"예정",next:"progress"}, progress:{label:"진행중",next:"done"},
  done:{label:"완료",next:"planned"}, carried:{label:"이월",next:"planned"},
  hold:{label:"보류",next:"planned"}, cancelled:{label:"취소",next:"planned"}
};
const STATUS_ORDER=["planned","progress","done","carried","hold","cancelled"];
const PRIORITIES=["긴급","높음","보통","낮음"];
const CARRY_REASONS=["일정 미확정","유관 부서 회신 대기","우선순위 변경","자료 부족","담당자 부재","긴급업무 발생","업무 범위 변경","기타"];
const PARTS=["인사","전산"];
const MEMBER_PARTS=["인사","전산","팀"];
const ROLES=["팀장","파트장","파트원"];
const PART_CATS={
  "인사":["인사관리","채용","온보딩·교육","급여·근태","총무","기타"],
  "전산":["시스템개발","ERP·RPA","인프라·운영","정보보호","총무","기타"]
};
const PART_COLOR={
  "인사":{fg:"#1d4ed8",bg:"#dbeafe"},
  "전산":{fg:"#047857",bg:"#d1fae5"},
  "팀":{fg:"#b45309",bg:"#fde68a"}
};
const EVENT_TYPES=["일정","회의","연차","반차","휴가","출장","교육","기타"];
const EVENT_COLOR={
  "연차":{fg:"#be185d",bg:"#fce7f3"},"반차":{fg:"#be185d",bg:"#fce7f3"},"휴가":{fg:"#be185d",bg:"#fce7f3"},
  "출장":{fg:"#0369a1",bg:"#e0f2fe"},"교육":{fg:"#6d28d9",bg:"#ede9fe"},"회의":{fg:"#92400e",bg:"#fef3c7"}
};
function evColor(it){return EVENT_COLOR[it.category]||PART_COLOR[it.part]||PART_COLOR["인사"];}
const STATUS_CHART_COLOR={done:"#111111",progress:"#f59e0b",planned:"#b6bec9",carried:"#dc2626",hold:"#7c3aed",cancelled:"#dfe3e8"};

let _u=0;
const uid=()=>Date.now().toString(36)+"-"+(_u++).toString(36)+"-"+Math.random().toString(36).slice(2,5);
const esc=(s)=>String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const isEv=(it)=>it&&(it.isEvent==="1"||it.isEvent===1||it.isEvent===true);

/* ── 전역 상태 ── */
let apiUrl=localStorage.getItem(API_KEY)||"";
let mode=localStorage.getItem(MODE_KEY)||"";
/* 파일 상단 <팀 공유 설정>에 URL이 입력돼 있으면, 처음 접속한 팀원도 설정 없이 자동 연결 */
const PRESET_URL=(typeof window!=="undefined"&&window.TEAM_API_URL?String(window.TEAM_API_URL):"").trim();
if(PRESET_URL&&!localStorage.getItem(API_KEY)&&!localStorage.getItem(MODE_KEY)){
  apiUrl=PRESET_URL; mode="shared";
  try{localStorage.setItem(API_KEY,apiUrl);localStorage.setItem(MODE_KEY,"shared");}catch(e){}
}
let state=null;
let lastLoad=0;
let srvVersion="";
const now=new Date();
const ui={
  weekKey:fmtKey(mondayOf(new Date())),
  view:"week", ownerFilter:"전체", partFilter:"전체", expandedId:null,
  query:"", searchStatus:"전체", searchOwner:"전체", searchPart:"전체",
  reportOpen:false, copied:false, confirmReset:false,
  setupMsg:"", setupBusy:false,
  upWeek:"this", upPart:"인사", upOwner:"", upText:"",
  calY:now.getFullYear(), calM:now.getMonth(), calSel:todayKey(),
  editMember:null, serverEmpty:false, dashExpand:null, dashFilter:"all", peopleExpand:null, peopleFilter:"total", reasonModal:null, notiOpen:false, pickUser:false
};

const memberNames=()=>state.members.map(m=>m.name);
const findMember=(name)=>state.members.find(x=>x.name===name);
const memberPart=(name)=>{const m=findMember(name);return m?(m.part==="팀"?"인사":m.part):"인사";};
const displayName=(m)=>m.name+(m.title?" "+m.title:"");

/* ── 업무번호 ── */
function nextTaskNo(weekKey){
  const stub=weekKey.replaceAll("-","").slice(0,8);
  const prefix="HR-"+stub.slice(0,4)+"-"+stub.slice(4);
  let max=0;
  Object.values(state.weeks).forEach(w=>w.items.forEach(it=>{
    if(it.taskNo&&it.taskNo.startsWith(prefix)){const n=parseInt(it.taskNo.split("-").pop(),10);if(n>max)max=n;}
  }));
  return prefix+"-"+String(max+1).padStart(3,"0");
}

/* ── 정규화 ── */
function guessPart(cat){
  const kw=["시스템","ERP","RPA","인프라","정보보호","전산","개발","서버","솔루션","네트워크","백업"];
  return kw.some(k=>String(cat||"").includes(k))?"전산":"인사";
}
function defaultMembers(){
  return [
    {name:"임무택",part:"팀",title:"상무",role:"팀장"},
    {name:"정효남",part:"인사",title:"책임",role:"파트장"},
    {name:"김동면",part:"인사",title:"책임",role:"파트원"},
    {name:"김신혜",part:"인사",title:"책임",role:"파트원"},
    {name:"안성민",part:"전산",title:"수석",role:"파트장"},
    {name:"전형만",part:"전산",title:"책임",role:"파트원"}
  ];
}
function normalizeState(s){
  if(!s)return s;
  s.members=(s.members||[]).map(m=>typeof m==="string"
    ?{name:m,part:"인사",title:"",role:"파트원"}
    :{name:m.name,part:(MEMBER_PARTS.includes(m.part)?m.part:"인사"),title:m.title||"",role:(ROLES.includes(m.role)?m.role:(m.part==="팀"?"팀장":"파트원"))});
  if(!s.members.length)s.members=defaultMembers();
  s.weeks=s.weeks||{};
  Object.values(s.weeks).forEach(w=>(w.items||[]).forEach(it=>{
    if(isEv(it)){ if(!it.part)it.part="인사"; }
    else if(!it.part||!PARTS.includes(it.part))it.part=guessPart(it.category);
    it.dueDate=normDateOnly(it.dueDate);
    if(it.isEvent==null)it.isEvent="";
    it.history=it.history||[];it.comments=it.comments||[];
  }));
  if(!s.me||!s.members.some(m=>m.name===s.me))s.me="김동면";
  if(!s.members.some(m=>m.name===s.me))s.me=s.members[0].name;
  s.team=s.team||"인재문화팀";
  s.msgs=s.msgs||[];
  return s;
}

/* ── 시드 데이터 ── */
function seedData(){
  const thisMon=fmtKey(mondayOf(new Date()));
  const lastMon=shiftWeek(thisMon,-1);
  let seq=0;
  const mk=(wk,part,cat,text,status,extra)=>Object.assign({
    id:uid(),
    taskNo:"HR-"+wk.replaceAll("-","").slice(0,4)+"-"+wk.replaceAll("-","").slice(4,8)+"-"+String(++seq).padStart(3,"0"),
    part,owner:"김동면",category:cat,text,detail:"",dueDate:"",priority:"보통",
    status:status||"planned",result:"",carryReason:"",carriedFrom:null,history:[],comments:[],
    createdAt:wk,updatedAt:wk,isEvent:""
  },extra||{});
  const last=[
    mk(lastMon,"인사","온보딩·교육","3기·4기 입사자 대상 뉴비토크 과정 진행","done"),
    mk(lastMon,"인사","온보딩·교육","이동훈 수석 리플렉션 미팅 진행 및 결과보고서 작성·결재","done"),
    mk(lastMon,"인사","온보딩·교육","신규입사자 입사 일정에 맞춰 교육자료, 안내사항 및 입사 준비","done"),
    mk(lastMon,"인사","온보딩·교육","금주 입사 예정자 관련 사전 준비 및 유관 부서 확인","done"),
    mk(lastMon,"인사","온보딩·교육","뉴비토크 및 리플렉션 과정에서 확인된 의견과 개선사항 정리","done"),
    mk(lastMon,"인사","온보딩·교육","입사자별 온보딩 진행 현황 및 후속 일정 점검","done")
  ];
  seq=0;
  const cur=[
    mk(thisMon,"인사","온보딩·교육","신규입사자 교육 진행 및 다음 입사자 교육 준비","planned",{priority:"높음"}),
    mk(thisMon,"인사","온보딩·교육","3기·4기 뉴비토크 결과보고서 작성","planned",{priority:"높음",dueDate:fmtKey(addDays(new Date(thisMon+"T00:00:00"),4))}),
    mk(thisMon,"인사","온보딩·교육","1기·2기 사업장 소개 일정 안내 메일 발송 및 사전 과제 점검","planned"),
    mk(thisMon,"인사","온보딩·교육","노신민·최민철·이규철 등 최근 입사자 대상 입사교육 일정 수립 및 준비","planned"),
    mk(thisMon,"인사","온보딩·교육","신규입사자별 온보딩 진행 현황 및 후속 일정 관리","planned"),
    mk(thisMon,"인사","인사관리","인사파트 내 인수인계 자료 정리","planned",{priority:"높음"}),
    mk(thisMon,"인사","인사관리","주요 일정, 업무 절차 및 관련 자료 현황 점검","planned"),
    mk(thisMon,"인사","총무","8월 라운드업 목사님 일정 확인","planned"),
    mk(thisMon,"인사","총무","8월 라운드업 운영사항 확정 후 관련 내용 공지","planned")
  ];
  return normalizeState({
    weeks:{[lastMon]:{items:last},[thisMon]:{items:cur}},
    members:defaultMembers(),
    team:"인재문화팀", me:"김동면"
  });
}

/* ══════════ 동기화 레이어 ══════════ */
const dirty={items:new Map(), deletes:new Set()};
let flushTimer=null;

function setBadge(txt,cls){
  const b=document.getElementById("save-badge");
  b.textContent=txt; b.className="save-badge"+(cls?" "+cls:"");
}
function cacheLocal(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}

function fromServer(data){
  srvVersion=String(data.version||"");
  const weeks={};
  (data.items||[]).forEach(r=>{
    const wk=normWeekKey(r.week);
    if(!weeks[wk])weeks[wk]={items:[]};
    delete r.week;
    weeks[wk].items.push(r);
  });
  return normalizeState({
    weeks,
    members:data.members||[],
    msgs:data.messages||[],
    team:"인재문화팀",
    me:localStorage.getItem("wwt-me")||""
  });
}

async function loadAll(){
  if(mode!=="shared"||!apiUrl){
    const raw=localStorage.getItem(KEY);
    state=normalizeState(raw?JSON.parse(raw):seedData());
    cacheLocal();
    setBadge("","");
    return;
  }
  setBadge("불러오는 중…");
  try{
    const res=await fetch(apiUrl+"?action=all");
    const data=await res.json();
    srvVersion=String(data.version||"");
    if((data.items||[]).length===0&&(data.members||[]).length===0){
      // 서버가 비어 있으면 자동 등록하지 않음 — 시트에서 지운 데이터가 되살아나는 것 방지
      state=normalizeState({weeks:{},members:[],me:localStorage.getItem("wwt-me")||""});
      ui.serverEmpty=true;
    }else{
      state=fromServer(data);
      ui.serverEmpty=false;
    }
    runNotiDiff();
    lastLoad=Date.now();
    cacheLocal();
    setBadge("✓ 동기화됨","ok");
    setTimeout(()=>{if(document.getElementById("save-badge").textContent==="✓ 동기화됨")setBadge("");},2000);
  }catch(e){
    const raw=localStorage.getItem(KEY);
    state=normalizeState(raw?JSON.parse(raw):seedData());
    setBadge("오프라인 — 로컬 데이터 표시 중","err");
  }
}

function markDirty(item,wk){
  cacheLocal();
  snapUpdate(item);
  if(mode!=="shared"){setBadge("✓ 저장됨","ok");setTimeout(()=>{if(document.getElementById("save-badge").textContent==="✓ 저장됨")setBadge("");},1500);return;}
  dirty.items.set(item.id,JSON.parse(JSON.stringify({...item,week:wk})));
  scheduleFlush();
}
function markDelete(id){
  cacheLocal();
  snapDelete(id);
  if(mode!=="shared"){setBadge("✓ 저장됨","ok");return;}
  dirty.items.delete(id);
  dirty.deletes.add(id);
  scheduleFlush();
}
function scheduleFlush(delay){
  setBadge("동기화 중…");
  if(flushTimer)clearTimeout(flushTimer);
  flushTimer=setTimeout(flush,delay==null?800:delay);
}
async function flush(){
  if(mode!=="shared"||!apiUrl)return;
  const upserts=[...dirty.items.values()];
  const deletes=[...dirty.deletes];
  if(!upserts.length&&!deletes.length){setBadge("✓ 동기화됨","ok");return;}
  try{
    const res=await fetch(apiUrl,{method:"POST",body:JSON.stringify({action:"sync",upserts,deletes})});
    const data=await res.json();
    if(data&&data.ok){
      upserts.forEach(u=>dirty.items.delete(u.id));
      deletes.forEach(d=>dirty.deletes.delete(d));
      setBadge("✓ 동기화됨","ok");
      setTimeout(()=>{if(document.getElementById("save-badge").textContent==="✓ 동기화됨")setBadge("");},2000);
    }else throw new Error((data&&data.error)||"서버 오류");
  }catch(e){
    setBadge("동기화 실패 — 자동 재시도","err");
    flushTimer=setTimeout(flush,6000);
  }
}
async function refreshNow(){
  await flush();
  await loadAll();
  render();
}
async function postApi(payload){
  if(mode!=="shared"||!apiUrl)return;
  try{await fetch(apiUrl,{method:"POST",body:JSON.stringify(payload)});}catch(e){}
}

/* ══════════ 알림 시스템 ══════════
   서버 데이터를 이전 스냅샷과 비교해 '나와 관련된 변화'만 알림으로 만든다.
   - 내 업무에 새 코멘트 / 누군가 내 이름 언급
   - 새 업무·일정이 나에게 배정 / 담당자가 나로 변경
   - 내 업무 상태가 다른 곳에서 변경됨
   내 기기에서의 변경은 snapUpdate로 즉시 기준점에 반영되어 자기 알림이 생기지 않는다. */
const NOTI_KEY="wwt-notis", SNAP_KEY="wwt-snap";
let notis=[]; try{notis=JSON.parse(localStorage.getItem(NOTI_KEY)||"[]");}catch(e){notis=[];}
let snap=null; try{snap=JSON.parse(localStorage.getItem(SNAP_KEY)||"null");}catch(e){snap=null;}
function saveNotis(){try{localStorage.setItem(NOTI_KEY,JSON.stringify(notis.slice(0,50)));}catch(e){}}
function saveSnap(){try{localStorage.setItem(SNAP_KEY,JSON.stringify(snap));}catch(e){}}
function snapEntry(it){return {c:(it.comments||[]).length,o:it.owner,s:it.status};}
function buildSnap(){
  const s={};
  Object.keys(state.weeks).forEach(wk=>state.weeks[wk].items.forEach(it=>{s[it.id]=snapEntry(it);}));
  return s;
}
function snapUpdate(it){if(snap){snap[it.id]=snapEntry(it);saveSnap();}}
function snapDelete(id){if(snap&&snap[id]){delete snap[id];saveSnap();}}
function pushNoti(text,itemId,view){
  notis.unshift({id:uid(),text,itemId:itemId||null,view:view||"",ts:Date.now(),read:false});
  notis=notis.slice(0,50);
  saveNotis();
  try{
    if(typeof Notification!=="undefined"&&Notification.permission==="granted"){
      new Notification("워크온 Work:ON",{body:text});
    }
  }catch(e){}
}
function runNotiDiff(){
  if(!state)return;
  const cur=buildSnap();
  if(!snap){snap=cur;saveSnap();runMsgNotiDiff();return;} // 최초 접속: 기준점만 저장하고 알림 생략
  const me=state.me;
  Object.keys(state.weeks).forEach(wk=>state.weeks[wk].items.forEach(it=>{
    const prev=snap[it.id];
    if(!prev){
      if(it.owner===me){
        if(isEv(it))pushNoti("내 일정이 등록되었습니다: "+it.text,it.id);
        else pushNoti("새 업무가 배정되었습니다: "+it.text,it.id);
      }
      return;
    }
    const cms=it.comments||[];
    if(cms.length>prev.c){
      cms.slice(prev.c).forEach(cm=>{
        if(cm.author===me)return;
        if(it.owner===me)pushNoti(cm.author+" 님이 내 업무에 코멘트: \""+cm.text+"\" — "+it.text,it.id);
        else if(me&&String(cm.text).indexOf(me)>=0)pushNoti(cm.author+" 님이 코멘트에서 나를 언급: \""+cm.text+"\" — "+it.text,it.id);
      });
    }
    if(prev.o!==it.owner&&it.owner===me&&!isEv(it))pushNoti("업무 담당자가 나로 변경되었습니다: "+it.text,it.id);
    if(prev.s!==it.status&&it.owner===me&&!isEv(it)){
      const from=STATUS[prev.s]?STATUS[prev.s].label:prev.s;
      pushNoti("내 업무 상태가 변경되었습니다: "+it.text+" ("+from+" → "+STATUS[it.status].label+")",it.id);
    }
  }));
  snap=cur;saveSnap();
  runMsgNotiDiff();
}
function unreadCount(){return notis.filter(n=>!n.read).length;}
function fmtTs(ts){const d=new Date(ts);return (d.getMonth()+1)+"."+d.getDate()+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
function notiModalHTML(){
  const permBtn=(typeof Notification!=="undefined"&&Notification.permission!=="granted")

      '<div style="flex:1;min-width:0"><div class="noti-text">'+esc(n.text)+'</div><div class="noti-time">'+fmtTs(n.ts)+"</div></div>"+

  }
  return '<div class="overlay"><div class="modal" style="width:min(540px,100%)">'

    +'<button class="ghost" data-action="noti-clear">모두 지우기</button>'
    +'<button class="ghost" data-action="noti-close">닫기</button></div></div>'
    +'<div style="padding:10px 14px;overflow-y:auto;max-height:60vh">'+body+"</div>"
    +'<div class="modal-foot">페이지가 열려 있는 동안 1분마다 자동으로 확인합니다. 창을 닫으면 알림이 오지 않으며, 다시 접속하면 밀린 알림이 표시됩니다.</div></div></div>';
}

/* ══════════ 쪽지 · 칭찬 카드 · 사용자 선택 ══════════ */
const KUDOS_BADGES=[["👏","최고예요"],["🙏","감사해요"],["💡","아이디어 굿"],["🤝","든든한 협업"],["🎯","깔끔한 마무리"],["🔥","열정 가득"]];
const MSGSEEN_KEY="wwt-msgseen";
let msgSeen=null; try{const raw=localStorage.getItem(MSGSEEN_KEY);msgSeen=raw?new Set(JSON.parse(raw)):null;}catch(e){msgSeen=null;}
function saveMsgSeen(){try{localStorage.setItem(MSGSEEN_KEY,JSON.stringify([...msgSeen].slice(-600)));}catch(e){}}
function kudosCountFor(name){return (state.msgs||[]).filter(m=>m.kind==="kudos"&&m.to===name).length;}
function runMsgNotiDiff(){
  const msgs=state.msgs||[];
  if(!msgSeen){msgSeen=new Set(msgs.map(m=>m.id));saveMsgSeen();return;}
  const me=state.me;
  msgs.forEach(m=>{
    if(msgSeen.has(m.id))return;
    msgSeen.add(m.id);
    if(m.from===me)return;
    if(m.kind==="kudos"&&m.to===me)pushNoti(m.from+" 님이 칭찬 카드를 보냈습니다 "+(m.badge||"")+(m.text?': "'+m.text+'"':""),null,"msg");
    else if(m.kind==="dm"&&m.to===me)pushNoti(m.from+" 님의 쪽지: \""+m.text+"\"",null,"msg");
  });
  saveMsgSeen();
}
function sendMessage(kind){
  if(srvVersion!=="5"){alert("메시지·칭찬 기능은 Apps Script 코드 v5 재배포 후 사용할 수 있습니다.");return;}
  const to=(document.getElementById(kind==="kudos"?"kd-to":"dm-to")||{}).value||"";
  const textEl=document.getElementById(kind==="kudos"?"kd-text":"dm-text");
  let text=(textEl?textEl.value:"").trim();
  let badge="";
  if(kind==="kudos"){
    badge=(document.getElementById("kd-badge")||{}).value||KUDOS_BADGES[0].join(" ");
    if(!text)text="";
  }else{
    if(!text)return;
  }
  if(!to||to===state.me&&kind==="dm")return;
  const m={id:uid(),kind,from:state.me,to,badge,text,ts:String(Date.now())};
  state.msgs=state.msgs||[];
  state.msgs.push(m);
  if(msgSeen){msgSeen.add(m.id);saveMsgSeen();}
  cacheLocal();
  postApi(Object.assign({action:"addMessage"},m));
  if(textEl)textEl.value="";
  render();
}
function deleteMessage(id){
  state.msgs=(state.msgs||[]).filter(m=>m.id!==id);
  cacheLocal();
  postApi({action:"deleteMessage",id});
  render();
}
function fmtMsgTs(ts){
  const n=Number(ts);
  if(!n)return "";
  return fmtTs(n);
}

/* ── 데이터 조작 ── */
function ensureWeek(key){if(!state.weeks[key])state.weeks[key]={items:[]};}
function findItem(id){
  for(const wk of Object.keys(state.weeks)){
    const it=state.weeks[wk].items.find(i=>i.id===id);
    if(it)return {it,wk};
  }
  return null;
}
function patchItem(id,patch){
  const f=findItem(id);
  if(f){Object.assign(f.it,patch,{updatedAt:todayKey()});markDirty(f.it,f.wk);}
}
function removeItem(id){
  Object.keys(state.weeks).forEach(wk=>{state.weeks[wk].items=state.weeks[wk].items.filter(i=>i.id!==id);});
  if(ui.expandedId===id)ui.expandedId=null;
  markDelete(id);render();
}
function cycleStatus(id){
  const f=findItem(id);
  if(f){f.it.status=STATUS[f.it.status].next;f.it.updatedAt=todayKey();markDirty(f.it,f.wk);render();}
}
function carryItemTo(item,fromKey,toKey,reason){
  ensureWeek(toKey);
  const src=state.weeks[fromKey]&&state.weeks[fromKey].items.find(i=>i.id===item.id);
  if(src){
    src.status="carried";
    if(reason&&!src.carryReason)src.carryReason=reason;
    src.updatedAt=todayKey();
    markDirty(src,fromKey);
  }
  const copy=JSON.parse(JSON.stringify(item));
  Object.assign(copy,{
    id:uid(),taskNo:nextTaskNo(toKey),status:"planned",result:"",
    carryReason:reason||item.carryReason||"",carriedFrom:fromKey,
    history:(item.history||[]).concat([fromKey]),comments:[],
    createdAt:todayKey(),updatedAt:todayKey()
  });
  state.weeks[toKey].items.push(copy);
  markDirty(copy,toKey);
  return copy;
}
function carryToNextWeek(id){
  const f=findItem(id);
  if(!f)return;
  carryItemTo(f.it,f.wk,shiftWeek(f.wk,1));
  ui.expandedId=null;
  render();
}
function prevUnfinished(){
  const prevKey=shiftWeek(ui.weekKey,-1);
  const prev=((state.weeks[prevKey]&&state.weeks[prevKey].items)||[]).filter(i=>!isEv(i));
  const curSet=new Set(((state.weeks[ui.weekKey]&&state.weeks[ui.weekKey].items)||[]).map(i=>i.text+"|"+i.owner));
  return prev.filter(i=>["planned","progress","hold"].includes(i.status)&&!curSet.has(i.text+"|"+i.owner));
}
function allItems(){
  const out=[];
  Object.keys(state.weeks).forEach(wk=>state.weeks[wk].items.forEach(it=>out.push({wk,it})));
  return out;
}

/* ── 보고서 ── */
function groupByCategory(items){
  const m=new Map();
  items.forEach(it=>{if(!m.has(it.category))m.set(it.category,[]);m.get(it.category).push(it);});
  return m;
}
function reportSection(items,isPlan,showWho){
  const L=[];
  for(const part of PARTS){
    const pi=items.filter(i=>(i.part||"인사")===part);
    if(!pi.length)continue;
    L.push("■ "+part+" 파트");
    let n=1;
    for(const [cat,its] of groupByCategory(pi)){
      L.push(n+". "+cat);
      its.forEach(it=>{
        if(isPlan){
          const bits=[];
          if(it.carriedFrom)bits.push("전주 이월");
          if(it.priority==="긴급"||it.priority==="높음")bits.push("우선순위 "+it.priority);
          if(it.dueDate)bits.push("~"+it.dueDate.slice(5).replace("-","."));
          const who=showWho?" ["+it.owner+"]":"";
          L.push("* "+it.text+(bits.length?" ("+bits.join(", ")+")":"")+who);
        }else{
          const tag=it.status==="done"?"":
            it.status==="carried"?" (금주 이월"+(it.carryReason?" — "+it.carryReason:"")+")":
            it.status==="hold"?" (보류"+(it.carryReason?" — "+it.carryReason:"")+")":
            it.status==="cancelled"?" (취소"+(it.carryReason?" — "+it.carryReason:"")+")":
            it.status==="progress"?" (진행중)":" (미착수)";
          const note=it.result?" — "+it.result:"";
          const who=showWho?" ["+it.owner+"]":"";
          L.push("* "+it.text+tag+note+who);
        }
      });
      L.push("");n++;
    }
  }
  return L;
}
function buildReport(){
  const owner=ui.ownerFilter;
  const prevKey=shiftWeek(ui.weekKey,-1);
  const filt=a=>{
    let r=a.filter(i=>!isEv(i));
    if(owner!=="전체")r=r.filter(i=>i.owner===owner);
    if(ui.partFilter!=="전체")r=r.filter(i=>(i.part||"인사")===ui.partFilter);
    return r;
  };
  const prev=filt((state.weeks[prevKey]&&state.weeks[prevKey].items)||[]);
  const cur=filt((state.weeks[ui.weekKey]&&state.weeks[ui.weekKey].items)||[]);
  const showWho=owner==="전체";
  const L=["금주 업무계획 및 지난주 업무 진행 결과 보고드립니다."];
  if(owner!=="전체")L.push("(담당: "+owner+")");
  if(ui.partFilter!=="전체")L.push("(파트: "+ui.partFilter+")");
  L.push("");
  if(prev.length){L.push("[지난주 업무 진행 결과]","");L.push(...reportSection(prev,false,showWho));}
  if(cur.length){L.push("[금주 업무계획]","");L.push(...reportSection(cur,true,showWho));}
  return L.join("\n").trim();
}

/* ── CSV ── */
function downloadCSV(){
  const rows=[["구분","업무번호","주차","파트","담당자","분류","업무명","상세계획","우선순위","완료예정일","상태","결과","이월사유","이월횟수","코멘트"]];
  const e=v=>'"'+String(v??"").replaceAll('"','""')+'"';
  Object.keys(state.weeks).sort().forEach(wk=>{
    state.weeks[wk].items.forEach(it=>{
      rows.push([isEv(it)?"일정":"업무",it.taskNo,weekLabel(wk).short,it.part||"인사",it.owner,it.category,it.text,it.detail,it.priority,it.dueDate,
        (STATUS[it.status]||{}).label||it.status,it.result,it.carryReason,(it.history||[]).length,
        (it.comments||[]).map(c=>c.author+": "+c.text).join(" / ")].map(e));
    });
  });
  const blob=new Blob(["\uFEFF"+rows.map(r=>r.join(",")).join("\n")],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="워크온_주간업무_"+todayKey()+".csv";
  a.click();
  URL.revokeObjectURL(a.href);
}

/* ── 계획 파싱 ── */
function parsePlanText(text){
  const out=[];
  let cat="기타";
  String(text||"").split(/\r?\n/).forEach(raw=>{
    const line=raw.trim();
    if(!line)return;
    if(/^\[.*\]$/.test(line))return;
    if(/보고드립니다|이상입니다/.test(line))return;
    let m=line.match(/^\d+\s*[.)]\s*(.+)$/);
    if(m){cat=m[1].trim();return;}
    m=line.match(/^[■▶]\s*(.+?)(\s*파트)?$/);
    if(m&&PARTS.includes(m[1].trim()))return;
    m=line.match(/^[*\-•·▪]\s*(.+)$/);
    if(m){out.push({category:cat,text:m[1].trim()});return;}
    out.push({category:cat,text:line});
  });
  return out;
}

function buildBuckets(items){
  const today=todayKey();
  const b={issue:[],prog:[],done:[],plan:[]};
  items.forEach(i=>{
    if(i.status==="cancelled")return;
    const carry=(i.history||[]).length;
    const over=i.dueDate&&i.dueDate<today&&i.status!=="done";
    if(i.status==="done"){b.done.push([i,""]);return;}
    if(over){b.issue.push([i,"⏰ 기한 초과 ("+i.dueDate.slice(5).replace("-",".")+")"]);return;}
    if(i.status==="carried"){b.issue.push([i,"↪ 다음 주 이월 처리"+(i.carryReason?" — "+esc(i.carryReason):" — 사유 미입력")]);return;}
    if(carry>=1){b.issue.push([i,"🔁 이월 "+(carry+1)+"주째"+(i.carryReason?" — "+esc(i.carryReason):" — 사유 미입력")]);return;}
    if(i.status==="hold"){b.issue.push([i,"⏸ 보류"+(i.carryReason?" — "+esc(i.carryReason):"")]);return;}
    if(["긴급","높음"].includes(i.priority)&&i.status==="planned"){b.issue.push([i,"⚡ 우선순위 "+i.priority+" — 아직 미착수"]);return;}
    if(i.status==="progress"){b.prog.push([i,i.dueDate?"~"+i.dueDate.slice(5).replace("-","."):""]);return;}
    b.plan.push([i,i.dueDate?"~"+i.dueDate.slice(5).replace("-","."):""]);
  });
  return b;
}
const DD_FILTER_LABEL={all:"전체",total:"전체 목록",done:"완료",progress:"진행중",carried:"이월",urgent:"긴급·높음",overdue:"일정 초과"};
function filterItems(items,filter){
  const today=todayKey();
  switch(filter){
    case "done": return items.filter(i=>i.status==="done").map(i=>[i,""]);
    case "progress": return items.filter(i=>i.status==="progress").map(i=>[i,i.dueDate?"~"+i.dueDate.slice(5).replace("-","."):""]);
    case "carried": return items.filter(i=>(i.carriedFrom&&!["done","cancelled"].includes(i.status))||i.status==="carried")
      .map(i=>[i,i.status==="carried"?"↪ 다음 주 이월 처리":"🔁 이월 "+(((i.history||[]).length)+1)+"주째"+(i.carryReason?" — "+esc(i.carryReason):"")]);
    case "urgent": return items.filter(i=>["긴급","높음"].includes(i.priority)&&i.status!=="done").map(i=>[i,"우선순위 "+i.priority]);
    case "overdue": return items.filter(i=>i.dueDate&&i.dueDate<today&&!["done","cancelled"].includes(i.status)).map(i=>[i,"⏰ 기한 초과 ("+i.dueDate.slice(5).replace("-",".")+")"]);
    case "total": return items.filter(i=>i.status!=="cancelled").map(i=>[i,i.dueDate?"~"+i.dueDate.slice(5).replace("-","."):""]);
    default: return null;
  }
}

  wk=wk||ui.weekKey;
  if(!items.length){
    return '<div class="dash-detail"><div class="dd-empty">'+esc(displayName(mem))+' — 이번 주차에 등록된 업무가 없습니다. 주간 계획 제출을 요청해 보세요.</div></div>';
  }
  // 특정 숫자 클릭 → 해당 목록만
  if(filter&&filter!=="all"){
    const list=filterItems(items,filter)||[];
    let h='<div class="dash-detail"><div class="dd-filter-head"><b>'+esc(displayName(mem))+'</b> — '+DD_FILTER_LABEL[filter]+' '+list.length+'건'+
      '<button class="ghost" data-action="dash-expand" data-val="'+esc(mem.name)+'" data-filter="all" style="margin-left:8px">전체 보기</button></div>';
    h+=list.length?list.map(p=>ddLine(p[0],p[1],wk)).join(""):'<div class="dd-empty">해당하는 업무가 없습니다.</div>';
    return h+"</div>";
  }
  // 전체 보기: 지원 필요 우선 정렬
  const b=buildBuckets(items);
  let h='<div class="dash-detail">';
  if(b.issue.length){
    h+='<div class="dd-sec warn"><div class="dd-title" style="color:#b91c1c">⚠ 확인·지원 필요 ('+b.issue.length+')</div>'+b.issue.map(p=>ddLine(p[0],p[1],wk)).join("")+"</div>";
  }else{
    h+='<div class="dd-clear">✅ 지원이 필요한 업무가 없습니다 — 기한 초과·이월·보류 0건</div>';
  }
  if(b.prog.length)h+='<div class="dd-sec"><div class="dd-title">🔄 진행중 ('+b.prog.length+')</div>'+b.prog.map(p=>ddLine(p[0],p[1],wk)).join("")+"</div>";
  if(b.done.length)h+='<div class="dd-sec"><div class="dd-title">✔ 완료 ('+b.done.length+')</div>'+b.done.map(p=>ddLine(p[0],p[1],wk)).join("")+"</div>";
  if(b.plan.length)h+='<div class="dd-sec"><div class="dd-title">▫ 예정 ('+b.plan.length+')</div>'+b.plan.map(p=>ddLine(p[0],p[1],wk)).join("")+"</div>";
  return h+"</div>";
}

/* ── 팀 현황 (시각화 포함) ── */
function weeklyTrend(){
  const thisMon=fmtKey(mondayOf(new Date()));
  const weeks=[];
  for(let i=5;i>=0;i--)weeks.push(shiftWeek(thisMon,-i));
  return weeks.map(wk=>{
    const items=(((state.weeks[wk]||{}).items)||[]).filter(i=>!isEv(i));
    const active=items.filter(i=>i.status!=="cancelled").length;
    const done=items.filter(i=>i.status==="done").length;
    return {wk,label:weekLabel(wk).short,pct:active?Math.round(done/active*100):0,total:items.length};
  });
}

function searchResultsHTML(){
  const q=ui.query.trim().toLowerCase();
  const results=[];
  Object.keys(state.weeks).sort().reverse().forEach(wk=>{
    state.weeks[wk].items.forEach(it=>{
      if(ui.searchPart!=="전체"&&(it.part||"인사")!==ui.searchPart)return;
      if(ui.searchOwner!=="전체"&&it.owner!==ui.searchOwner)return;
      if(ui.searchStatus!=="전체"&&STATUS[it.status].label!==ui.searchStatus)return;
      if(q&&!(it.text.toLowerCase().includes(q)||it.category.toLowerCase().includes(q)||
        (it.result||"").toLowerCase().includes(q)||(it.taskNo||"").toLowerCase().includes(q)))return;
      results.push({wk,it});
    });
  });
  let html='<div class="search-count">'+results.length+"건 — 주차별 최신순. 항목을 클릭하면 해당 주차로 이동합니다.</div>";
  results.forEach(r=>{
    html+='<div class="search-row" data-action="jump" data-id="'+r.it.id+'" data-val="'+r.wk+'">'+
      '<div class="sr-head"><span class="sr-badge '+statusClass(r.it.status)+'">'+(isEv(r.it)?"일정":STATUS[r.it.status].label)+"</span>"+
      pchip(r.it.part||"인사")+
      '<span class="sr-no">'+esc(r.it.taskNo)+'</span><span class="sr-week">'+weekLabel(r.wk).short+"</span>"+
      '<span class="sr-meta">'+esc(r.it.owner)+" · "+esc(r.it.category)+"</span></div>"+
      '<div class="sr-text">'+esc(r.it.text)+"</div>"+
      (r.it.result?'<div class="sr-result">결과: '+esc(r.it.result)+"</div>":"")+"</div>";
  });
  if(!results.length)html+='<div class="empty">조건에 맞는 업무가 없습니다.</div>';
  return html;
}

function addComment(id){
  const authorEl=document.getElementById("cmt-author-"+id);
  const textEl=document.getElementById("cmt-text-"+id);
  if(!textEl||!textEl.value.trim())return;
  const f=findItem(id);
  if(f){
    f.it.comments=f.it.comments||[];
    f.it.comments.push({author:authorEl?authorEl.value:state.me,text:textEl.value.trim(),date:todayKey()});
    f.it.updatedAt=todayKey();
    markDirty(f.it,f.wk);
    render();
  }
}
function makeItem(weekKey,part,owner,cat,text,extra){
  return Object.assign({
    id:uid(),taskNo:nextTaskNo(weekKey),part,owner,category:cat,text,
    detail:"",dueDate:"",priority:"보통",status:"planned",result:"",carryReason:"",
    carriedFrom:null,history:[],comments:[],createdAt:todayKey(),updatedAt:todayKey(),isEvent:""
  },extra||{});
}
function addItemFromInputs(){
  const text=(document.getElementById("add-text")||{}).value||"";
  if(!text.trim())return;
  const part=(document.getElementById("add-part")||{}).value||"인사";
  const owner=(document.getElementById("add-owner")||{}).value||state.me;
  let cat=((document.getElementById("add-cat")||{}).value||"").trim();
  if(!cat)cat=PART_CATS[part][0];
  ensureWeek(ui.weekKey);
  const it=makeItem(ui.weekKey,part,owner,cat,text.trim());
  state.weeks[ui.weekKey].items.push(it);
  markDirty(it,ui.weekKey);
  render();
  const el=document.getElementById("add-text");
  if(el)el.focus();
}
function addEvent(){
  const type=(document.getElementById("ev-type")||{}).value||"일정";
  const owner=(document.getElementById("ev-owner")||{}).value||state.me;
  let text=((document.getElementById("ev-text")||{}).value||"").trim();
  if(!text){
    if(["연차","반차","휴가","출장","교육"].includes(type))text=owner+" "+type;
    else return; // 일반 일정·회의는 제목 필수
  }
  const dateKey=ui.calSel;
  const wk=fmtKey(mondayOf(new Date(dateKey+"T00:00:00")));
  ensureWeek(wk);
  const evPart=(findMember(owner)||{}).part||"인사";
  const it=makeItem(wk,evPart,owner,type,text,{isEvent:"1",dueDate:dateKey});
  state.weeks[wk].items.push(it);
  markDirty(it,wk);
  render();
}
function uploadRegister(){
  const parsed=parsePlanText(ui.upText);
  if(!parsed.length)return;
  const targetKey=ui.upWeek==="next"?shiftWeek(fmtKey(mondayOf(new Date())),1):fmtKey(mondayOf(new Date()));
  const owner=ui.upOwner||state.me;
  ensureWeek(targetKey);
  parsed.forEach(p=>{
    const it=makeItem(targetKey,ui.upPart,owner,p.category,p.text);
    state.weeks[targetKey].items.push(it);
    markDirty(it,targetKey);
  });
  ui.upText="";
  ui.weekKey=targetKey;
  ui.view="week";
  ui.partFilter="전체";
  render();
}
function copyReport(){
  const text=buildReport();
  const done=()=>{ui.copied=true;renderModal();setTimeout(()=>{ui.copied=false;renderModal();},2000);};
  const fallback=()=>{
    const ta=document.createElement("textarea");
    ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
    document.body.appendChild(ta);ta.select();
    try{document.execCommand("copy");done();}catch(e){}
    document.body.removeChild(ta);
  };
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(text).then(done).catch(fallback);
  else fallback();
}
async function connectSetup(){
  const inp=document.getElementById("setup-url");
  let url=(inp?inp.value:"").trim();
  if(!url){ui.setupMsg="URL을 입력하세요.";render();return;}
  if(!url.startsWith("https://script.google.com/")){ui.setupMsg="Apps Script 웹 앱 URL(https://script.google.com/…)이어야 합니다.";render();return;}
  ui.setupBusy=true;ui.setupMsg="";render();
  try{
    const res=await fetch(url+"?action=all");
    const data=await res.json();
    if(!data||(!Array.isArray(data.items)&&!data.ok))throw new Error("응답 형식 오류");
    apiUrl=url; mode="shared";
    localStorage.setItem(API_KEY,url);
    localStorage.setItem(MODE_KEY,"shared");
    ui.setupBusy=false; ui.setupMsg="";
    ui.view="week";
    await loadAll();
    render();
  }catch(e){
    ui.setupBusy=false;
    ui.setupMsg="연결 실패: URL이 정확한지, 배포 시 액세스 권한이 '모든 사용자'인지 확인하세요.";
    render();
  }
}
function addMemberAction(name){

  const role=(document.getElementById("member-role-new")||{}).value||"파트원";
  state.members.push({name,part,title,role});

  render();
}

document.addEventListener("click",async (ev)=>{
  const el=ev.target.closest("[data-action]");
  if(!el)return;
  const a=el.dataset.action, id=el.dataset.id, val=el.dataset.val;
  switch(a){
    case "report-close": ui.reportOpen=false; renderModal(); break;
    case "seed-server": seedToServer(); break;
    case "tab": ui.view=val; ui.confirmReset=false; ui.editMember=null; render(); break;
    case "week-prev": ui.weekKey=shiftWeek(ui.weekKey,-1); ui.expandedId=null; render(); break;
    case "week-next": ui.weekKey=shiftWeek(ui.weekKey,1); ui.expandedId=null; render(); break;
    case "week-today": ui.weekKey=fmtKey(mondayOf(new Date())); ui.expandedId=null; render(); break;
    case "part-filter": ui.partFilter=val; render(); break;
    case "cycle": cycleStatus(id); break;
    case "expand": ui.expandedId=(ui.expandedId===id?null:id); render(); break;
    case "carry-next":
      ui.reasonModal={id:id,mode:"carry-next",status:"carried",err:false};
      renderModal();
      break;
    case "carry-all": {
      const n=prevUnfinished().length;
      if(!n)break;
      ui.reasonModal={mode:"carry-all",status:"carried",count:n,err:false};
      renderModal();
      break;
    }
    case "pick-me": state.me=val; localStorage.setItem("wwt-me",val); ui.pickUser=false; cacheLocal(); renderModal(); render(); break;
    case "kudos-send": sendMessage("kudos"); break;
    case "dm-send": sendMessage("dm"); break;
    case "msg-del": if(confirm("이 메시지를 삭제할까요?"))deleteMessage(id); break;
    case "noti-open": ui.notiOpen=true; notis.forEach(n=>n.read=true); saveNotis(); renderTabs(); renderModal(); break;
    case "noti-close": ui.notiOpen=false; renderModal(); break;
    case "noti-clear": notis=[]; saveNotis(); renderModal(); renderTabs(); break;
    case "noti-perm": try{Notification.requestPermission().then(()=>renderModal());}catch(e){} break;
    case "noti-jump": {
      const f=id?findItem(id):null;
      ui.notiOpen=false;
      if(f){ui.weekKey=f.wk;ui.view="week";ui.expandedId=id;ui.ownerFilter="전체";ui.partFilter="전체";}
      else if(val==="msg"){ui.view="msg";}
      renderModal(); render();
      setTimeout(()=>{const t=document.querySelector(".item.expanded");if(t&&t.scrollIntoView)t.scrollIntoView({behavior:"smooth",block:"center"});},50);
      break;
    }
    case "reason-cancel": ui.reasonModal=null; renderModal(); render(); break;
    case "reason-confirm": {
      const rm=ui.reasonModal;
      if(!rm)break;
      const sel=(document.getElementById("reason-sel")||{}).value||"";
      const etc=((document.getElementById("reason-etc")||{}).value||"").trim();
      if(!sel){rm.err=true;renderModal();break;}
      const reason=etc?(sel==="기타"?etc:sel+" — "+etc):sel;
      ui.reasonModal=null;
      renderModal();
      if(rm.mode==="status"){
        patchItem(rm.id,{status:rm.status,carryReason:reason});
      }else if(rm.mode==="carry-next"){
        const f=findItem(rm.id);
        if(f){
          const src=f.it; src.carryReason=""; // 팝업 사유를 확실히 반영
          carryItemTo(src,f.wk,shiftWeek(f.wk,1),reason);
          ui.expandedId=null;
        }
      }else if(rm.mode==="carry-all"){
        prevUnfinished().forEach(it=>carryItemTo(it,shiftWeek(ui.weekKey,-1),ui.weekKey,it.carryReason||reason));
      }
      render();
      break;
    }
    case "add-item": addItemFromInputs(); break;
    case "remove": if(confirm("이 업무를 삭제할까요?"))removeItem(id); break;
    case "comment-add": addComment(id); break;
    case "report-open": ui.reportOpen=true; ui.copied=false; renderModal(); break;
    case "report-copy": copyReport(); break;
    case "csv": downloadCSV(); break;
    case "reset-ask": ui.confirmReset=true; render(); break;
    case "reset-no": ui.confirmReset=false; render(); break;
    case "reset-yes": state=seedData(); ui.confirmReset=false; cacheLocal(); render(); break;
    case "dash-member": ui.ownerFilter=val; ui.view="week"; render(); break;
    case "person-stat": {
      const f=el.dataset.filter||"total";
      if(ui.peopleExpand===val&&ui.peopleFilter===f)ui.peopleExpand=null;
      else{ui.peopleExpand=val;ui.peopleFilter=f;}
      render(); break;
    }
    case "dash-expand": {
      const f=el.dataset.filter||"all";
      if(ui.dashExpand===val&&ui.dashFilter===f)ui.dashExpand=null;
      else{ui.dashExpand=val;ui.dashFilter=f;}
      render(); break;
    }
    case "refresh": refreshNow(); break;
    case "setup-open": ui.view="setup"; ui.setupMsg=""; render(); break;
    case "setup-back": ui.view="week"; render(); break;
    case "setup-connect": connectSetup(); break;
    case "setup-personal":
      mode="personal"; localStorage.setItem(MODE_KEY,"personal");
      ui.view="week"; await loadAll(); render(); break;
    case "setup-disconnect":
      if(confirm("팀 공유 연결을 해제하고 개인 모드로 전환할까요? (구글 시트의 데이터는 그대로 남습니다)")){
        mode="personal"; apiUrl="";
        localStorage.setItem(MODE_KEY,"personal");
        localStorage.removeItem(API_KEY);
        ui.view="week"; await loadAll(); render();
      }
      break;
    case "jump": ui.weekKey=normWeekKey(val); ui.view="week"; ui.expandedId=id; ui.ownerFilter="전체"; ui.partFilter="전체"; render();
      setTimeout(()=>{const t=document.querySelector('.item.expanded');if(t&&t.scrollIntoView)t.scrollIntoView({behavior:"smooth",block:"center"});},50); break;
    case "member-add": {
      const inp=document.getElementById("member-name");
      if(inp)addMemberAction(inp.value);
      break;
    }
    case "member-edit": ui.editMember=(ui.editMember===val?null:val); render(); break;
    case "member-save": {
      const mem=findMember(val);
      if(mem){
        mem.part=(document.getElementById("pe-part")||{}).value||mem.part;
        mem.title=((document.getElementById("pe-title")||{}).value||"").trim();
        mem.role=(document.getElementById("pe-role")||{}).value||mem.role;
        cacheLocal();
        postApi({action:"updateMember",name:mem.name,part:mem.part,title:mem.title,role:mem.role});
        ui.editMember=null;
        render();
      }
      break;
    }
    case "member-del": {
      if(state.members.length<=1)break;
      if(confirm(val+" 님을 팀원 목록에서 삭제할까요? (등록된 업무는 유지됩니다)")){
        state.members=state.members.filter(x=>x.name!==val);
        if(state.me===val)state.me=state.members[0].name;
        ui.editMember=null;
        cacheLocal();
        postApi({action:"removeMember",name:val});
        render();
      }
      break;
    }
    case "up-register": uploadRegister(); break;
    case "up-clear": ui.upText=""; render(); break;
    case "cal-prev": ui.calM--; if(ui.calM<0){ui.calM=11;ui.calY--;} render(); break;
    case "cal-next": ui.calM++; if(ui.calM>11){ui.calM=0;ui.calY++;} render(); break;
    case "cal-today": ui.calY=new Date().getFullYear(); ui.calM=new Date().getMonth(); ui.calSel=todayKey(); render(); break;
    case "cal-day": ui.calSel=val; render(); break;
    case "event-add": addEvent(); break;
    case "event-del": if(confirm("이 일정을 삭제할까요?"))removeItem(id); break;
  }
});

document.addEventListener("click",(ev)=>{
  if(ev.target.classList&&ev.target.classList.contains("overlay")){
    if(ui.reasonModal){ui.reasonModal=null;renderModal();render();return;}
    if(ui.notiOpen){ui.notiOpen=false;renderModal();return;}
    ui.reportOpen=false;renderModal();
  }
});

document.addEventListener("change",(ev)=>{
  const el=ev.target;
  if(el.dataset&&el.dataset.field&&el.dataset.id){
    // 이월·보류·취소로 바꾸면 즉시 반영하지 않고 사유 팝업을 먼저 띄운다
    if(el.dataset.field==="status"&&["carried","hold","cancelled"].includes(el.value)){
      ui.reasonModal={id:el.dataset.id,mode:"status",status:el.value,err:false};
      renderModal();
      return;
    }
    const patch={};patch[el.dataset.field]=el.value;
    patchItem(el.dataset.id,patch);
    if(["status","priority","owner","carryReason","text","dueDate","part","category"].includes(el.dataset.field))render();
    return;
  }
  const a=el.dataset?el.dataset.action:null;
  if(a==="owner-filter"){ui.ownerFilter=el.value;render();return;}
  if(a==="search-owner"){ui.searchOwner=el.value;render();return;}
  if(a==="search-status"){ui.searchStatus=el.value;render();return;}
  if(a==="search-part"){ui.searchPart=el.value;render();return;}
  if(a==="set-me"){state.me=el.value;localStorage.setItem("wwt-me",el.value);cacheLocal();render();return;}
  if(a==="up-week"){ui.upWeek=el.value;render();return;}
  if(a==="up-part"){ui.upPart=el.value;render();return;}
  if(a==="up-owner"){ui.upOwner=el.value;return;}
});

document.addEventListener("input",(ev)=>{
  const el=ev.target;
  if(el.dataset&&el.dataset.actionInput==="search"){
    ui.query=el.value;
    const box=document.getElementById("search-results");
    if(box)box.innerHTML=searchResultsHTML(); // 입력창은 건드리지 않음 → 받침 조합 유지
    return;
  }
  if(el.dataset&&el.dataset.actionInput==="upload"){
    ui.upText=el.value;
    const pv=document.getElementById("up-preview");
    if(pv)pv.innerHTML=uploadPreviewHTML();
  }
});

document.addEventListener("keydown",(ev)=>{
  if(ev.key==="Escape"&&ui.reasonModal){ui.reasonModal=null;renderModal();render();return;}
  if(ev.key==="Escape"&&ui.notiOpen){ui.notiOpen=false;renderModal();return;}
  if(ev.key!=="Enter")return;
  if(ui.reasonModal){document.querySelector('[data-action="reason-confirm"]').click();return;}
  const el=ev.target;
  if(el.dataset&&el.dataset.actionEnter==="add-item")addItemFromInputs();
  if(el.dataset&&el.dataset.actionEnter==="comment-add")addComment(el.dataset.id);
  if(el.dataset&&el.dataset.actionEnter==="member-add")addMemberAction(el.value);
  if(el.dataset&&el.dataset.actionEnter==="event-add")addEvent();
  if(el.dataset&&el.dataset.actionEnter==="kudos-send")sendMessage("kudos");
  if(el.dataset&&el.dataset.actionEnter==="dm-send")sendMessage("dm");
});

document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="visible"&&mode==="shared"&&Date.now()-lastLoad>60000){
    refreshNow();
  }
});

/* ── 주기적 자동 확인 (알림·동기화) ── */
function isTyping(){const a=document.activeElement;return a&&["INPUT","TEXTAREA","SELECT"].includes(a.tagName);}
setInterval(async ()=>{
  if(mode!=="shared"||document.visibilityState!=="visible")return;
  if(dirty.items.size||dirty.deletes.size)return;
  if(ui.reasonModal||ui.reportOpen||ui.notiOpen)return;
  if(isTyping())return;
  await loadAll();
  render();
},60000);

/* ── 시작 ── */
(async function init(){
  if(mode==="shared"&&apiUrl){
    await loadAll(); render();
  }else if(mode==="personal"){
    await loadAll(); render();
  }else{
    ui.view="setup"; render();
  }
})();

</script>
</body>
</html>
